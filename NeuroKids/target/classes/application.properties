
# Configurações da Aplicação - Neurodivergente Platform


# Porta do servidor
server.port=8080


# Banco de Dados MySQL

spring.datasource.url=jdbc:mysql://localhost:3307/neurokids?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kskill0910.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate

# create-drop: apaga e recria ao iniciar (dev)
# update: atualiza sem apagar dados (produção)
# validate: só valida sem alterar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Swagger / OpenAPI

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method


# Logs

logging.level.com.neurodivergente=DEBUG
logging.level.org.hibernate.SQL=DEBUG